name: Cleanup old workflow runs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  workflow_call:

concurrency:
  group: cleanup-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cleanup-runs:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
      RETAIN_DAYS: 7
      KEEP_MINIMUM: 5
    steps:
      - name: Delete old workflow runs
        run: |
          CUTOFF=$(date -u -d "${RETAIN_DAYS} days ago" +%Y-%m-%dT%H:%M:%SZ)
          gh run list --repo "${{ github.repository }}" \
            --json databaseId,createdAt --limit 200 \
          | jq -r --arg cutoff "$CUTOFF" --argjson keep "$KEEP_MINIMUM" \
            'sort_by(.createdAt) | reverse | .[$keep:] | .[] | select(.createdAt < $cutoff) | .databaseId' \
          | xargs -r -I{} gh run delete {} --repo "${{ github.repository }}"

  cleanup-caches:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      actions: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Delete caches from merged/deleted branches
        run: |
          echo "=== Cleaning caches from non-existent branches ==="
          gh cache list --repo "${{ github.repository }}" --json id,ref,key --limit 200 \
          | jq -r '.[] | "\(.id)\t\(.ref)\t\(.key)"' \
          | while IFS=$'\t' read -r id ref key; do
              branch="${ref#refs/heads/}"
              # Keep caches for main, default branch, and tags
              if [ "$branch" = "main" ] || [[ "$ref" == refs/tags/* ]]; then
                continue
              fi
              # Check if branch still exists
              if ! gh api "repos/${{ github.repository }}/branches/${branch}" --silent 2>/dev/null; then
                echo "Deleting cache ${key} (branch ${branch} no longer exists)"
                gh cache delete "$id" --repo "${{ github.repository }}" 2>/dev/null || true
              fi
            done

  cleanup-images:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      packages: write
    env:
      GH_TOKEN: ${{ github.token }}
      KEEP_MINIMUM: 5
    steps:
      - name: Delete untagged container images
        run: |
          PACKAGE="golang-web"
          OWNER="${{ github.repository_owner }}"
          gh api "orgs/${OWNER}/packages/container/${PACKAGE}/versions" \
            --jq "[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[${KEEP_MINIMUM}:][] | .id" 2>/dev/null \
          | xargs -r -I{} gh api --method DELETE "orgs/${OWNER}/packages/container/${PACKAGE}/versions/{}" 2>/dev/null || \
          gh api "users/${OWNER}/packages/container/${PACKAGE}/versions" \
            --jq "[.[] | select(.metadata.container.tags | length == 0)] | sort_by(.created_at) | reverse | .[${KEEP_MINIMUM}:][] | .id" 2>/dev/null \
          | xargs -r -I{} gh api --method DELETE "users/${OWNER}/packages/container/${PACKAGE}/versions/{}" 2>/dev/null || true
